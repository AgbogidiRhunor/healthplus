<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Health Plus – Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #0ea5e9;
      --primary-dark: #0284c7;
      --accent: #10b981;
      --bg: #f0f9ff;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --error: #ef4444;
      --warn: #f59e0b;
    }
    body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .wrap { width: 100%; max-width: 440px; padding: 24px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo svg { width: 48px; height: 48px; }
    .logo h1 { font-size: 1.75rem; font-weight: 800; color: var(--primary); margin-top: 8px; }
    .logo p { color: var(--muted); font-size: .9rem; margin-top: 4px; }
    .card { background: var(--surface); border-radius: 16px; padding: 32px; box-shadow: 0 4px 24px rgba(14,165,233,.1); border: 1px solid var(--border); }
    .card h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 24px; color: var(--text); }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: .85rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
    input[type=text], input[type=password] { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .95rem; color: var(--text); background: #f8fafc; transition: border-color .2s, box-shadow .2s; }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(14,165,233,.15); background: #fff; }
    .btn { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background .2s, transform .1s; margin-top: 4px; }
    .btn:hover { background: var(--primary-dark); }
    .btn:active { transform: scale(.99); }
    .link-row { text-align: center; margin-top: 20px; font-size: .9rem; color: var(--muted); }
    .link-row a { color: var(--primary); font-weight: 600; text-decoration: none; }
    .link-row a:hover { text-decoration: underline; }
    .messages { margin-bottom: 16px; }
    .msg { padding: 10px 14px; border-radius: 8px; font-size: .875rem; margin-bottom: 8px; }
    .msg.error { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
    .msg.success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .msg.warning, .msg.info { background: #fef9c3; color: #92400e; border: 1px solid #fde68a; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="48" height="48" rx="12" fill="#0ea5e9"/>
      <path d="M20 14h8v6h6v8h-6v6h-8v-6h-6v-8h6z" fill="white"/>
    </svg>
    <h1>Health Plus</h1>
    <p>Your Health, Our Priority</p>
  </div>

  <div class="card">
    <h2>Sign In</h2>

    {% if messages %}
    <div class="messages">
      {% for message in messages %}
      <div class="msg {{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" required autofocus />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required />
      </div>
      <button class="btn" type="submit">Sign In</button>
    </form>

    <div class="link-row">
      Don't have an account? <a href="{% url 'signup' %}">Create one</a>
    </div>
  </div>
</div>
</body>
</html>
